<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#111a2e" />
    </linearGradient>
    <style>
      .zone { stroke:#fff; stroke-width:3; fill-opacity:.14; }
      .label { font:600 28px Arial, sans-serif; fill:#fff; }
      .zone-a { fill:#4f8cff; }
      .zone-b { fill:#6c5ce7; }
      .zone-c { fill:#00b894; }
      .zone-d { fill:#fdcb6e; }
      .zone-e { fill:#ff7675; }
      .grid { stroke:rgba(255,255,255,.15); stroke-width:1; }
    </style>
  </defs>
  <rect width="900" height="600" fill="url(#bg)" rx="24" />
  <g opacity="0.9">
    <rect x="60" y="60" width="320" height="220" class="zone zone-a" rx="16" />
    <text x="220" y="150" text-anchor="middle" class="label">Zone A</text>
    <rect x="520" y="60" width="320" height="220" class="zone zone-b" rx="16" />
    <text x="680" y="150" text-anchor="middle" class="label">Zone B</text>
    <rect x="60" y="340" width="220" height="200" class="zone zone-c" rx="16" />
    <text x="170" y="430" text-anchor="middle" class="label">Zone C</text>
    <rect x="320" y="340" width="250" height="200" class="zone zone-d" rx="16" />
    <text x="445" y="430" text-anchor="middle" class="label">Zone D</text>
    <rect x="610" y="340" width="230" height="200" class="zone zone-e" rx="16" />
    <text x="725" y="430" text-anchor="middle" class="label">Zone E</text>
  </g>
  <g stroke="rgba(255,255,255,.1)" stroke-width="1">
    <line x1="0" y1="120" x2="900" y2="120" class="grid" />
    <line x1="0" y1="180" x2="900" y2="180" class="grid" />
    <line x1="0" y1="240" x2="900" y2="240" class="grid" />
    <line x1="100" y1="0" x2="100" y2="600" class="grid" />
    <line x1="200" y1="0" x2="200" y2="600" class="grid" />
    <line x1="300" y1="0" x2="300" y2="600" class="grid" />
  </g>
</svg>
