<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b101d" />
      <stop offset="100%" stop-color="#141b2b" />
    </linearGradient>

    <!-- Zone Gradients (Subtle Glows) -->
    <linearGradient id="zone-a-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#4f8cff" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="zone-b-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="zone-c-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b894" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00b894" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="zone-d-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdcb6e" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#fdcb6e" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="zone-e-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7675" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ff7675" stop-opacity="0.05" />
    </linearGradient>

    <!-- Reusable Horizontal Desk facing North -->
    <g id="desk-hn">
      <!-- Desk Surface -->
      <rect x="0" y="0" width="48" height="28" rx="4" fill="#1b253b" stroke="#2e3e5f" stroke-width="1"/>
      <!-- Monitor -->
      <rect x="12" y="2" width="24" height="2" rx="0.5" fill="#4f8cff" opacity="0.8"/>
      <rect x="20" y="4" width="8" height="3" fill="#2d3d5a"/>
      <!-- Keyboard -->
      <rect x="14" y="9" width="20" height="7" rx="1" fill="#0d1527" stroke="#25354f" stroke-width="0.5"/>
      <!-- Mouse -->
      <rect x="36" y="11" width="3" height="5" rx="1" fill="#0d1527"/>
      <!-- Chair -->
      <circle cx="24" cy="38" r="7" fill="#151e30" stroke="#354a70" stroke-width="1"/>
      <path d="M 16,42 C 16,36 32,36 32,42" fill="none" stroke="#354a70" stroke-width="2"/>
    </g>

    <!-- Reusable Horizontal Desk facing South -->
    <g id="desk-hs">
      <!-- Desk Surface -->
      <rect x="0" y="0" width="48" height="28" rx="4" fill="#1b253b" stroke="#2e3e5f" stroke-width="1"/>
      <!-- Monitor -->
      <rect x="12" y="24" width="24" height="2" rx="0.5" fill="#4f8cff" opacity="0.8"/>
      <rect x="20" y="21" width="8" height="3" fill="#2d3d5a"/>
      <!-- Keyboard -->
      <rect x="14" y="12" width="20" height="7" rx="1" fill="#0d1527" stroke="#25354f" stroke-width="0.5"/>
      <!-- Mouse -->
      <rect x="36" y="12" width="3" height="5" rx="1" fill="#0d1527"/>
      <!-- Chair -->
      <circle cx="24" cy="-10" r="7" fill="#151e30" stroke="#354a70" stroke-width="1"/>
      <path d="M 16,-14 C 16,-8 32,-8 32,-14" fill="none" stroke="#354a70" stroke-width="2"/>
    </g>

    <!-- Reusable Vertical Desk facing West -->
    <g id="desk-vw">
      <!-- Desk Surface -->
      <rect x="0" y="0" width="28" height="48" rx="4" fill="#1b253b" stroke="#2e3e5f" stroke-width="1"/>
      <!-- Monitor -->
      <rect x="2" y="12" width="2" height="24" rx="0.5" fill="#4f8cff" opacity="0.8"/>
      <rect x="4" y="20" width="3" height="8" fill="#2d3d5a"/>
      <!-- Keyboard -->
      <rect x="9" y="14" width="7" height="20" rx="1" fill="#0d1527" stroke="#25354f" stroke-width="0.5"/>
      <!-- Mouse -->
      <rect x="11" y="36" width="5" height="3" rx="1" fill="#0d1527"/>
      <!-- Chair -->
      <circle cx="38" cy="24" r="7" fill="#151e30" stroke="#354a70" stroke-width="1"/>
      <path d="M 42,16 C 36,16 36,32 42,32" fill="none" stroke="#354a70" stroke-width="2"/>
    </g>

    <!-- Reusable Plant -->
    <g id="plant">
      <circle cx="0" cy="0" r="10" fill="#0f2620" stroke="#00b894" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="7" fill="#10b981"/>
      <path d="M-5,-1 C-2,-6 2,-6 5,-1" fill="none" stroke="#d1fae5" stroke-width="1" opacity="0.7"/>
      <path d="M-1,5 C-6,2 -6,-2 -1,-5" fill="none" stroke="#d1fae5" stroke-width="1" opacity="0.7"/>
    </g>

    <!-- CSS Styling -->
    <style>
      .wall { stroke: #3a4d73; stroke-width: 3; fill: none; stroke-linecap: round; }
      .glass-wall { stroke: rgba(100, 200, 255, 0.4); stroke-width: 2; fill: none; }
      .zone-bg { stroke-width: 1.5; stroke-dasharray: 4,4; }
      .zone-bg-a { fill: url(#zone-a-grad); stroke: #4f8cff; }
      .zone-bg-b { fill: url(#zone-b-grad); stroke: #6c5ce7; }
      .zone-bg-c { fill: url(#zone-c-grad); stroke: #00b894; }
      .zone-bg-d { fill: url(#zone-d-grad); stroke: #fdcb6e; }
      .zone-bg-e { fill: url(#zone-e-grad); stroke: #ff7675; }
      .zone-lbl { font-family: 'Outfit', 'Inter', 'Segoe UI', sans-serif; font-size: 16px; font-weight: 700; fill: #ffffff; letter-spacing: 1px; opacity: 0.85; }
      .room-lbl { font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 11px; fill: #637b9b; font-weight: 500; }
      .grid-lines { stroke: rgba(255, 255, 255, 0.03); stroke-width: 1; }
      .amenity { fill: #1c273e; stroke: #2a3c5d; stroke-width: 1; }
      .sofa { fill: #202e48; stroke: #33486d; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Ground Background -->
  <rect width="900" height="600" fill="url(#bg-grad)" rx="16" />

  <!-- Background Grid Lines -->
  <g>
    <!-- Vertical Grid Lines -->
    <line x1="100" y1="0" x2="100" y2="600" class="grid-lines" />
    <line x1="200" y1="0" x2="200" y2="600" class="grid-lines" />
    <line x1="300" y1="0" x2="300" y2="600" class="grid-lines" />
    <line x1="400" y1="0" x2="400" y2="600" class="grid-lines" />
    <line x1="500" y1="0" x2="500" y2="600" class="grid-lines" />
    <line x1="600" y1="0" x2="600" y2="600" class="grid-lines" />
    <line x1="700" y1="0" x2="700" y2="600" class="grid-lines" />
    <line x1="800" y1="0" x2="800" y2="600" class="grid-lines" />
    <!-- Horizontal Grid Lines -->
    <line x1="0" y1="100" x2="900" y2="100" class="grid-lines" />
    <line x1="0" y1="200" x2="900" y2="200" class="grid-lines" />
    <line x1="0" y1="300" x2="900" y2="300" class="grid-lines" />
    <line x1="0" y1="400" x2="900" y2="400" class="grid-lines" />
    <line x1="0" y1="500" x2="900" y2="500" class="grid-lines" />
  </g>

  <!-- ==================== ZONE OVERLAYS ==================== -->
  <!-- These bounds correspond EXACTLY to script.js ZONE_BOUNDS -->
  <!-- Zone A: left 60 (6.67%), top 60 (10%), width 320, height 220 -->
  <rect x="60" y="60" width="320" height="220" rx="12" class="zone-bg zone-bg-a" />
  <!-- Zone B: left 520 (57.78%), top 60 (10%), width 320, height 220 -->
  <rect x="520" y="60" width="320" height="220" rx="12" class="zone-bg zone-bg-b" />
  <!-- Zone C: left 60 (6.67%), top 340 (56.67%), width 220, height 200 -->
  <rect x="60" y="340" width="220" height="200" rx="12" class="zone-bg zone-bg-c" />
  <!-- Zone D: left 320 (35.56%), top 340 (56.67%), width 250, height 200 -->
  <rect x="320" y="340" width="250" height="200" rx="12" class="zone-bg zone-bg-d" />
  <!-- Zone E: left 610 (67.78%), top 340 (56.67%), width 230, height 200 -->
  <rect x="610" y="340" width="230" height="200" rx="12" class="zone-bg zone-bg-e" />

  <!-- ==================== WALLS & STRUCTURE ==================== -->
  <!-- Outer perimeter wall -->
  <rect x="40" y="40" width="820" height="520" rx="16" fill="none" stroke="#253554" stroke-width="4" />
  
  <!-- Outer Window glow indicators -->
  <line x1="140" y1="40" x2="300" y2="40" stroke="#00d2ff" stroke-width="3" opacity="0.6"/>
  <line x1="600" y1="40" x2="760" y2="40" stroke="#00d2ff" stroke-width="3" opacity="0.6"/>
  <line x1="40" y1="140" x2="40" y2="260" stroke="#00d2ff" stroke-width="3" opacity="0.6"/>
  <line x1="860" y1="140" x2="860" y2="260" stroke="#00d2ff" stroke-width="3" opacity="0.6"/>
  <line x1="140" y1="560" x2="300" y2="560" stroke="#00d2ff" stroke-width="3" opacity="0.6"/>
  <line x1="600" y1="560" x2="760" y2="560" stroke="#00d2ff" stroke-width="3" opacity="0.6"/>

  <!-- Interior Wall Structures separating rooms -->
  <!-- Central Walkway / Corridor Corridor Wall -->
  <line x1="395" y1="40" x2="395" y2="300" class="wall" />
  <line x1="505" y1="40" x2="505" y2="300" class="wall" />
  <line x1="295" y1="340" x2="295" y2="560" class="wall" />
  <line x1="585" y1="340" x2="585" y2="560" class="wall" />
  <line x1="395" y1="300" x2="505" y2="300" class="wall" stroke-dasharray="8,8" /> <!-- Lobby entrance line -->

  <!-- Lobby & Elevator Shaft Core -->
  <rect x="410" y="100" width="80" height="90" rx="8" class="amenity" />
  <text x="450" y="130" text-anchor="middle" class="room-lbl" style="fill:#a0aec0">ELEVATORS</text>
  <rect x="425" y="150" width="22" height="24" rx="2" fill="#101726" stroke="#4a5d7e"/>
  <rect x="453" y="150" width="22" height="24" rx="2" fill="#101726" stroke="#4a5d7e"/>
  <line x1="436" y1="150" x2="436" y2="174" stroke="#4a5d7e"/>
  <line x1="464" y1="150" x2="464" y2="174" stroke="#4a5d7e"/>

  <!-- Reception Area -->
  <path d="M 415,240 C 415,220 485,220 485,240" fill="none" stroke="#319795" stroke-width="5" />
  <text x="450" y="260" text-anchor="middle" class="room-lbl">RECEPTION</text>

  <!-- Zone A Conference Room -->
  <rect x="250" y="200" width="120" height="70" rx="6" class="amenity" />
  <line x1="250" y1="200" x2="370" y2="200" class="glass-wall" />
  <line x1="250" y1="200" x2="250" y2="270" class="glass-wall" />
  <text x="310" y="218" text-anchor="middle" class="room-lbl">BOARDROOM A</text>
  <!-- Boardroom Table and Chairs -->
  <rect x="270" y="230" width="80" height="20" rx="10" fill="#2d3748" stroke="#4a5568"/>
  <circle cx="280" cy="223" r="4" fill="#4a5d7e"/>
  <circle cx="300" cy="223" r="4" fill="#4a5d7e"/>
  <circle cx="320" cy="223" r="4" fill="#4a5d7e"/>
  <circle cx="340" cy="223" r="4" fill="#4a5d7e"/>
  <circle cx="280" cy="257" r="4" fill="#4a5d7e"/>
  <circle cx="300" cy="257" r="4" fill="#4a5d7e"/>
  <circle cx="320" cy="257" r="4" fill="#4a5d7e"/>
  <circle cx="340" cy="257" r="4" fill="#4a5d7e"/>

  <!-- Zone B Phone Pods & Lounge -->
  <rect x="535" y="75" width="40" height="40" rx="4" class="amenity" />
  <rect x="585" y="75" width="40" height="40" rx="4" class="amenity" />
  <text x="555" y="98" text-anchor="middle" class="room-lbl" style="font-size:9px">POD 1</text>
  <text x="605" y="98" text-anchor="middle" class="room-lbl" style="font-size:9px">POD 2</text>
  
  <!-- Zone B Lounge Area -->
  <path d="M 760,200 L 820,200 L 820,260" fill="none" stroke="#2d3748" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" class="sofa"/>
  <rect x="765" y="215" width="35" height="35" rx="18" fill="#1a202c" stroke="#2d3d5a"/>
  <text x="792" y="190" text-anchor="middle" class="room-lbl">LOUNGE</text>

  <!-- Zone C Cafe / Kitchenette -->
  <rect x="70" y="475" width="130" height="55" rx="6" class="amenity" />
  <!-- Counter top -->
  <rect x="70" y="475" width="130" height="15" fill="#2d3748"/>
  <circle cx="95" cy="482" r="4" fill="#718096" /> <!-- sink -->
  <rect x="170" y="477" width="18" height="10" rx="1" fill="#4a5568"/> <!-- coffee maker -->
  <text x="135" y="515" text-anchor="middle" class="room-lbl">CAFETERIA</text>
  <!-- Coffee stools -->
  <circle cx="100" cy="505" r="5" fill="#1a202c" stroke="#4a5d7e"/>
  <circle cx="130" cy="505" r="5" fill="#1a202c" stroke="#4a5d7e"/>
  <circle cx="160" cy="505" r="5" fill="#1a202c" stroke="#4a5d7e"/>

  <!-- Zone E Servers and Tech hub -->
  <rect x="740" y="460" width="90" height="70" rx="6" class="amenity" />
  <line x1="740" y1="460" x2="740" y2="530" class="wall" />
  <line x1="740" y1="460" x2="830" y2="460" class="wall" />
  <text x="785" y="482" text-anchor="middle" class="room-lbl" style="fill:#ff7675">SERVER ROOM</text>
  <!-- Server racks -->
  <rect x="755" y="495" width="24" height="8" fill="#101726" stroke="#2d3748"/>
  <rect x="755" y="508" width="24" height="8" fill="#101726" stroke="#2d3748"/>
  <rect x="790" y="495" width="24" height="8" fill="#101726" stroke="#2d3748"/>
  <rect x="790" y="508" width="24" height="8" fill="#101726" stroke="#2d3748"/>

  <!-- ==================== DESK LAYOUTS ==================== -->
  
  <!-- ZONE A DESKS (Left top area) -->
  <!-- Desks Row 1 -->
  <use href="#desk-hn" x="80" y="80"/>
  <use href="#desk-hn" x="140" y="80"/>
  <use href="#desk-hn" x="200" y="80"/>
  <!-- Desks Row 2 -->
  <use href="#desk-hs" x="80" y="140"/>
  <use href="#desk-hs" x="140" y="140"/>
  <use href="#desk-hs" x="200" y="140"/>
  
  <!-- ZONE B DESKS (Right top area) -->
  <!-- Desks Row 1 -->
  <use href="#desk-hn" x="650" y="80"/>
  <use href="#desk-hn" x="710" y="80"/>
  <use href="#desk-hn" x="770" y="80"/>
  <!-- Desks Row 2 -->
  <use href="#desk-hs" x="650" y="140"/>
  <use href="#desk-hs" x="710" y="140"/>
  <use href="#desk-hs" x="770" y="140"/>
  <!-- Extra desks -->
  <use href="#desk-vw" x="535" y="140"/>
  <use href="#desk-vw" x="535" y="200"/>

  <!-- ZONE C DESKS (Left bottom area) -->
  <use href="#desk-hn" x="80" y="360"/>
  <use href="#desk-hn" x="140" y="360"/>
  <use href="#desk-hs" x="80" y="420"/>
  <use href="#desk-hs" x="140" y="420"/>

  <!-- ZONE D DESKS (Center bottom area) -->
  <!-- Quad Desk block -->
  <use href="#desk-hn" x="350" y="360"/>
  <use href="#desk-hn" x="410" y="360"/>
  <use href="#desk-hn" x="470" y="360"/>
  <use href="#desk-hs" x="350" y="420"/>
  <use href="#desk-hs" x="410" y="420"/>
  <use href="#desk-hs" x="470" y="420"/>
  <!-- Row 2 -->
  <use href="#desk-hn" x="350" y="480"/>
  <use href="#desk-hn" x="410" y="480"/>
  <use href="#desk-hn" x="470" y="480"/>

  <!-- ZONE E DESKS (Right bottom area) -->
  <use href="#desk-hn" x="630" y="360"/>
  <use href="#desk-hn" x="690" y="360"/>
  <use href="#desk-hn" x="750" y="360"/>
  <use href="#desk-hs" x="630" y="420"/>
  <use href="#desk-hs" x="690" y="420"/>
  <use href="#desk-hs" x="750" y="420"/>

  <!-- ==================== GREENERY & DECORATIONS ==================== -->
  <use href="#plant" x="330" y="85" />
  <use href="#plant" x="330" y="145" />
  <use href="#plant" x="575" y="145" />
  <use href="#plant" x="575" y="215" />
  <use href="#plant" x="235" y="365" />
  <use href="#plant" x="235" y="465" />
  <use href="#plant" x="335" y="525" />
  <use href="#plant" x="555" y="525" />
  <use href="#plant" x="635" y="485" />

  <!-- ==================== LABELS ==================== -->
  <!-- Zone Labels -->
  <text x="220" y="260" text-anchor="middle" class="zone-lbl" fill="#4f8cff">ZONE A</text>
  <text x="680" y="260" text-anchor="middle" class="zone-lbl" fill="#6c5ce7">ZONE B</text>
  <text x="170" y="375" text-anchor="middle" class="zone-lbl" fill="#00b894">ZONE C</text>
  <text x="445" y="515" text-anchor="middle" class="zone-lbl" fill="#fdcb6e">ZONE D</text>
  <text x="725" y="515" text-anchor="middle" class="zone-lbl" fill="#ff7675">ZONE E</text>

  <!-- Corridor & Entrance Labels -->
  <text x="450" y="290" text-anchor="middle" class="room-lbl" style="fill:#4a5d7e; font-size:10px; font-weight:700;">MAIN LOBBY ENTRANCE</text>
  
</svg>
